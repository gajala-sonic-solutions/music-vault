name: Generate Album Index

on:
  release:
    types: [published, edited, deleted]
  workflow_dispatch:

# Prevent two runs from colliding on the same branch
concurrency:
  group: generate-index
  cancel-in-progress: false   # don't cancel — queue instead

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate album JSONs and index.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_ACTION: ${{ github.event.action }}
        run: node .github/scripts/generate.js

      - name: Commit and push updated files
        run: |
          git checkout main

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json albums/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-update index for release [skip ci]"

          # Pull any changes that landed between our checkout and now,
          # then push. Retry once if the push still fails.
          git pull --rebase origin main
          git push origin main || (git pull --rebase origin main && git push origin main)
